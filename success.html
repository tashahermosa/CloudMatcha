<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmed | Cloud Matcha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face { font-family: 'Soap Bubble'; src: url('soap-bubble.otf') format('opentype'); }
        .font-bubble { font-family: 'Soap Bubble', sans-serif; }
    </style>
</head>
<body class="bg-[#fadce2] min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-2xl bg-white rounded-[3rem] shadow-2xl border border-[#e1e8d9] overflow-hidden">
        <div class="pt-10 pb-6 text-center">
            <h1 class="text-4xl md:text-6xl font-bubble text-[#5c7345]">YAY! ORDER PLACED</h1>
            <p class="text-gray-500 italic">Check your email for your receipt!</p>
        </div>
        <div class="px-6 md:px-12 pb-12">
            <div class="bg-white border-2 border-[#e1e8d9]/50 rounded-[2rem] p-6 md:p-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <div><p class="text-[10px] font-bold text-gray-400 uppercase">Order ID</p><p id="display-id" class="text-xl font-bold text-[#5c7345]">--</p></div>
                        <div><p class="text-[10px] font-bold text-gray-400 uppercase">What You Ordered</p><p id="display-items" class="text-sm text-gray-700 leading-relaxed">--</p></div>
                    </div>
                    <div class="space-y-6">
                        <div><p class="text-[10px] font-bold text-gray-400 uppercase">Fulfillment</p><p id="display-delivery" class="text-sm font-bold text-gray-700 capitalize">--</p></div>
                        <div><p class="text-[10px] font-bold text-gray-400 uppercase">Total Amount</p><p id="display-total" class="text-xl font-bold text-[#8ba870]">₱0</p></div>
                        <div><p class="text-[10px] font-bold text-gray-400 uppercase">Address / Pickup Info</p><p id="display-address" class="text-sm text-gray-600 italic">--</p></div>
                    </div>
                </div>
            </div>
            <div class="mt-8 bg-[#f3f4f1] rounded-[2rem] p-6 text-center border border-dashed border-[#8ba870]">
                <p class="text-[10px] font-bold uppercase text-[#5c7345] mb-4">⚠️ Final Step: Send Payment Proof</p>
                <img src="gcash-qr.png" class="mx-auto w-40 h-40 object-contain rounded-xl mb-4" alt="GCash">
                <p class="text-xs text-gray-500">Send screenshot to @snarxco on IG</p>
            </div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('display-id').textContent = params.get('id') || 'CM-ORDER';
        document.getElementById('display-total').textContent = '₱' + (params.get('total') || '0');
        document.getElementById('display-delivery').textContent = (params.get('delivery') || 'Standard').replace('pickup', 'Store Pickup');
        document.getElementById('display-address').textContent = params.get('address') || 'Check Email/IG';
        const items = params.get('items');
        document.getElementById('display-items').textContent = items ? decodeURIComponent(items) : 'Cloud Matcha Drink(s)';
    </script>
</body>
</html>
