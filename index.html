<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Matcha by sam</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        matcha: { light: '#e1e8d9', DEFAULT: '#8ba870', dark: '#5c7345' },
                        cream: '#fadce2' 
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        bubble: ['"Soap Bubble"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @font-face {
            font-family: 'Soap Bubble';
            src: url('soap-bubble.otf') format('opentype'); 
            font-weight: normal; font-style: normal;
        }
        #cart-items-container::-webkit-scrollbar { width: 8px; }
        #cart-items-container::-webkit-scrollbar-track { background: #fadce2; border-radius: 10px; }
        #cart-items-container::-webkit-scrollbar-thumb { background: #8ba870; border-radius: 10px; }
    </style>
</head>
<body class="bg-cream text-gray-800 antialiased selection:bg-matcha selection:text-white relative">

    <nav class="flex justify-between items-center py-6 px-8 md:px-16 border-b border-matcha-light/50">
        <div class="text-5xl font-bubble text-matcha-dark tracking-wide pt-1">Cloud Matcha ☁️</div>
        <div class="hidden md:flex text-sm font-serif text-gray-400">by sam & ash</div>
        <button onclick="toggleCart()" class="relative text-matcha-dark">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-matcha-dark text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-8 md:px-16 py-12 md:py-20 flex flex-col md:flex-row gap-12 md:gap-20 items-start">
        <div class="w-full md:w-5/12 flex flex-col items-center md:sticky md:top-10 mx-auto max-w-sm">
            <div class="relative group w-full">
                <div class="absolute inset-0 bg-matcha-light rounded-[3rem] transform -rotate-3 scale-105 opacity-50"></div>
                <img src="cloud-matcha.jpg" class="relative z-10 w-full h-[450px] object-cover rounded-[3rem] shadow-2xl" alt="Cloud Matcha">
            </div>
            <p class="text-gray-700 font-medium mt-10 text-justify text-lg leading-relaxed">
                Hand-whisked premium stone-milled matcha paired with our signature creamy foams, purees, and sea salt.
            </p>
        </div>

        <div class="w-full md:w-7/12" id="order">
            <h1 class="text-4xl md:text-5xl font-serif text-matcha-dark mb-8">Reserve Your Weekend</h1>
            <form id="add-to-cart-form" class="space-y-6" onsubmit="handleAddToCart(event)">
                <div class="space-y-4">
                    <label class="cursor-pointer block"><input type="radio" name="drink" value="Oat-G" data-price="215" class="peer sr-only" checked><div class="p-5 border-2 border-transparent bg-white rounded-2xl peer-checked:border-matcha">Oat-G (₱215)</div></label>
                    <label class="cursor-pointer block"><input type="radio" name="drink" value="Banana Cream Matcha" data-price="255" class="peer sr-only"><div class="p-5 border-2 border-transparent bg-white rounded-2xl peer-checked:border-matcha">Banana Cream (₱255)</div></label>
                    <label class="cursor-pointer block"><input type="radio" name="drink" value="Sea Salt Matcha" data-price="230" class="peer sr-only"><div class="p-5 border-2 border-transparent bg-white rounded-2xl peer-checked:border-matcha">Sea Salt (₱230)</div></label>
                </div>
                <select id="pickup_date" class="w-full p-4 rounded-xl bg-white border-2 border-white" required>
                    <option value="" disabled selected>Choose a weekend drop...</option>
                    <option value="Saturday Drop">This Saturday (2pm - 6pm)</option>
                    <option value="Sunday Drop">This Sunday (2pm - 6pm)</option>
                </select>
                <button type="submit" class="w-full bg-matcha-dark text-white py-4 rounded-xl font-bold uppercase tracking-widest">Add to Cart</button>
            </form>
        </div>
    </main>

    <div id="cart-overlay" class="fixed inset-0 bg-black/60 z-40 hidden backdrop-blur-sm" onclick="toggleCart()"></div>
    <div id="cart-panel" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[95%] max-w-2xl max-h-[90vh] bg-cream rounded-3xl shadow-2xl z-50 hidden flex flex-col overflow-hidden">
        <div class="p-6 border-b border-white bg-white/40 flex justify-between">
            <h2 class="text-2xl font-serif text-matcha-dark">Your Cart</h2>
            <button onclick="toggleCart()">×</button>
        </div>
        <div id="cart-items-container" class="flex-grow p-6 overflow-y-auto"><div id="cart-list"></div></div>
        <div class="p-6 border-t border-white bg-white/40">
            <select id="location-select" class="w-full p-3 rounded-xl mb-3" onchange="updateCartUI()">
                <option value="pickup">Store Pickup</option>
                <option value="belair">Within Belair (Free)</option>
                <option value="outside">Outside Belair (Customer covers Del. Fee)</option>
            </select>
            <textarea id="address-input" placeholder="Enter delivery address..." class="w-full p-3 rounded-xl hidden mb-3"></textarea>
            <p id="min-drink-warning" class="text-red-500 text-xs font-bold text-center hidden mb-3">⚠️ Minimum 2 drinks required for Outside Belair.</p>
            <div class="flex justify-between mb-4"><span class="font-medium">Total:</span><span id="cart-total" class="text-2xl font-bold">₱0</span></div>
            <button onclick="submitPreorder()" id="checkout-btn" class="w-full bg-matcha-dark text-white py-4 rounded-xl disabled:opacity-50">Submit Pre-order</button>
        </div>
    </div>

    <form id="matcha-form" action="https://formsubmit.co/samanthanicoleroco@gmail.com" method="POST" class="hidden">
        <input type="hidden" name="_contentType" value="text/html">
        <input type="hidden" name="_next" id="redirect-input" value="https://cloudmatcha.store/success.html">
        <input type="hidden" name="Order_ID" id="order-id-input">
        <input type="hidden" name="Total_Price" id="total-price-input">
        <input type="hidden" name="Order_Details" id="order-details-input">
        <input type="email" name="email" id="customer-email-input">
    </form>

    <script>
        let cart = [];
        const DEPLOY_URL = "https://cloudmatcha.store";
        function toggleCart() { document.getElementById('cart-overlay').classList.toggle('hidden'); document.getElementById('cart-panel').classList.toggle('hidden'); }
        function handleAddToCart(e) {
            e.preventDefault();
            const drink = document.querySelector('input[name="drink"]:checked');
            const drop = document.getElementById('pickup_date').value;
            cart.push({ name: drink.value, price: parseInt(drink.dataset.price), drop: drop });
            updateCartUI(); toggleCart();
        }
        function updateCartUI() {
            const loc = document.getElementById('location-select').value;
            const hasMin = cart.length >= 2;
            document.getElementById('address-input').classList.toggle('hidden', loc === 'pickup');
            document.getElementById('min-drink-warning').classList.toggle('hidden', loc !== 'outside' || hasMin);
            document.getElementById('checkout-btn').disabled = (loc === 'outside' && !hasMin) || cart.length === 0;
            
            let subtotal = 0; document.getElementById('cart-list').innerHTML = cart.map((i, idx) => {
                subtotal += i.price; return `<div class="flex justify-between p-3 bg-white/60 rounded-xl mb-2"><span>${i.name}</span><b>₱${i.price}</b></div>`;
            }).join('');
            document.getElementById('cart-total').textContent = `₱${subtotal}`;
            document.getElementById('cart-count').textContent = cart.length;
        }
        function submitPreorder() {
            const email = prompt("Enter email for confirmation:");
            if(!email || !email.includes('@')) return alert("Valid email required!");
            const itemsList = cart.map(i => i.name).join(', ');
            const id = `CM-${Math.random().toString(36).substr(2, 5).toUpperCase()}`;
            const total = document.getElementById('cart-total').textContent;
            const address = document.getElementById('address-input').value || 'Store Pickup';

            document.getElementById('order-id-input').value = id;
            document.getElementById('total-price-input').value = total;
            document.getElementById('customer-email-input').value = email;
            document.getElementById('order-details-input').value = `Method: ${document.getElementById('location-select').value}\nAddress: ${address}\nItems: ${itemsList}`;
            
            // FIXED: Sending &items parameter
            document.getElementById('redirect-input').value = `${DEPLOY_URL}/success.html?id=${id}&total=${total.replace('₱','')}&delivery=${document.getElementById('location-select').value}&address=${encodeURIComponent(address)}&items=${encodeURIComponent(itemsList)}`;
            document.getElementById('matcha-form').submit();
        }
    </script>
</body>
</html>
